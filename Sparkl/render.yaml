services:
  - type: web
    name: sparkl
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: DATA_DIR
        value: /var/data
    disk:
      name: sparkl-data
      mountPath: /var/data
      sizeGB: 1
