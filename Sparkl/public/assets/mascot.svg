<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Sparky the mascot">
  <defs>
    <radialGradient id="body" cx=".4" cy=".35" r=".8">
      <stop offset="0" stop-color="#FFE07A"/>
      <stop offset="1" stop-color="#FFC83D"/>
    </radialGradient>
  </defs>
  <!-- glow -->
  <circle cx="110" cy="112" r="92" fill="#FFC83D" opacity=".15"/>
