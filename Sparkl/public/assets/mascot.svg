  <!-- cheeks -->
  <circle cx="84" cy="118" r="10" fill="#FF6B6B" opacity=".6"/>
  <circle cx="136" cy="118" r="10" fill="#FF6B6B" opacity=".6"/>
  <!-- eyes -->
  <circle cx="90" cy="100" r="13" fill="#211A4A"/>
  <circle cx="130" cy="100" r="13" fill="#211A4A"/>
  <circle cx="94" cy="96" r="4.5" fill="#fff"/>
  <circle cx="134" cy="96" r="4.5" fill="#fff"/>
  <!-- smile -->
  <path d="M88 124 Q110 146 132 124" fill="none" stroke="#211A4A" stroke-width="6" stroke-linecap="round"/>
  <!-- little sparkle -->
  <path d="M176 44 c2 9 6 13 15 15 c-9 2 -13 6 -15 15 c-2 -9 -6 -13 -15 -15 c9 -2 13 -6 15 -15 Z" fill="#36C5F0"/>
