<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — ITHR Technologies LMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .admin { max-width: 1180px; margin: 30px auto; padding: 0 20px; }
    .toolbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
    table { width:100%; border-collapse: collapse; background:#fff; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
    th, td { text-align:left; padding:12px 14px; border-bottom:1px solid var(--line); font-size:14px; }
    th { background: var(--bg-soft); font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
    tr:last-child td { border-bottom:0; }
    .row-actions { display:flex; gap:8px; }
    .modal { position:fixed; inset:0; background:rgba(10,31,68,.55); display:none; place-items:center; z-index:100; padding:20px; overflow:auto; }
    .modal.open { display:grid; }
    .sheet { background:#fff; border-radius:16px; width:100%; max-width:720px; max-height:92vh; overflow:auto; padding:28px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
    .field textarea, .field select { width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:10px; font:inherit; }
    .field textarea { min-height:84px; resize:vertical; }
    .qrow { border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:10px; background:#fff; }
    .qrow .opt-line { font-size:13.5px; color:var(--body); padding:3px 0; }
    .qrow .opt-line.correct { color: var(--ok); font-weight:700; }
    .pill { font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; background:var(--bg-soft); color:var(--brand-600); }
    @media(max-width:680px){ .grid2,.grid3{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <div class="admin">
    <div class="toolbar">
      <div>
        <h1 style="font-size:28px;margin:0">Course Administration</h1>
        <p class="muted" style="margin:2px 0 0">Create and edit certifications and their exam question banks.</p>
      </div>
      <button class="btn btn-primary" id="new-course">+ New course</button>
    </div>
    <input id="filter" placeholder="Filter courses…" style="width:100%;padding:11px 15px;border:1.5px solid var(--line);border-radius:999px;font:inherit;margin-bottom:16px">
    <div id="list"><div class="loading">Loading…</div></div>
  </div>

  <!-- Course modal -->
  <div class="modal" id="course-modal">
    <div class="sheet">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2 id="cm-title" style="margin:0">New course</h2>
        <button class="btn btn-ghost btn-sm" onclick="closeModal('course-modal')">✕</button>
      </div>
      <div id="cm-msg"></div>
      <form id="course-form" style="margin-top:14px">
        <input type="hidden" id="f-id">
        <div class="field"><label>Name</label><input id="f-name" required></div>
        <div class="grid3">
          <div class="field"><label>Category</label><select id="f-category"></select></div>
          <div class="field"><label>Tier</label><select id="f-tier">
            <option>Fundamentals</option><option>Practitioner</option><option>Specialist</option><option>Expert</option><option>Strategist</option>
          </select></div>
          <div class="field"><label>Level</label><select id="f-level">
            <option>Beginner</option><option>Intermediate</option><option>Advanced</option>
          </select></div>
        </div>
        <div class="field"><label>Short description</label><textarea id="f-short" required></textarea></div>
        <div class="field"><label>Long description</label><textarea id="f-long"></textarea></div>
        <div class="grid3">
          <div class="field"><label>Duration (hours)</label><input id="f-hours" type="number" value="24"></div>
          <div class="field"><label>Price (USD)</label><input id="f-price" type="number" value="299"></div>
          <div class="field"><label>Pass mark (%)</label><input id="f-pass" type="number" value="70"></div>
        </div>
        <div class="field"><label>Modules (one per line)</label><textarea id="f-modules"></textarea></div>
        <div class="field"><label>Skills gained (one per line)</label><textarea id="f-skills"></textarea></div>
        <div style="display:flex;gap:10px;margin-top:6px">
          <button class="btn btn-primary" type="submit">Save course</button>
          <button class="btn btn-ghost" type="button" onclick="closeModal('course-modal')">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Questions modal -->
  <div class="modal" id="q-modal">
    <div class="sheet">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2 id="qm-title" style="margin:0">Question bank</h2>
        <button class="btn btn-ghost btn-sm" onclick="closeModal('q-modal')">✕</button>
      </div>
      <div id="q-list" style="margin:16px 0"></div>
      <h3 style="font-size:16px" id="qf-title">Add a question</h3>
      <div id="qf-msg"></div>
      <form id="q-form">
        <input type="hidden" id="q-id">
        <div class="field"><label>Question</label><textarea id="q-text" required></textarea></div>
        <div id="q-options"></div>
        <button type="button" class="btn btn-ghost btn-sm" id="add-opt">+ Add option</button>
        <div class="field" style="margin-top:14px"><label>Explanation (optional)</label><input id="q-expl"></div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" type="submit">Save question</button>
          <button class="btn btn-ghost" type="button" id="q-reset">Clear</button>
        </div>
      </form>
    </div>
  </div>

  <div id="site-footer"></div>
  <script src="/js/app.js"></script>
  <script>
    if (!Auth.isAuthed) location.href = '/login.html?next=/admin.html';
    let courses = [], cats = [], activeCourseId = null, optCount = 4;

    async function init() {
      try {
        [courses, cats] = await Promise.all([api('/admin/courses', { authed: true }), api('/categories')]);
      } catch (e) {
        document.querySelector('.admin').innerHTML = `<div class="alert alert-err">${esc(e.message)} — you must be signed in as an admin.</div>
          <p>Default admin: <b>admin@ithr360.com</b> / <b>admin12345</b>. <a href="/login.html?next=/admin.html">Sign in</a></p>`;
        return;
      }
      $('#f-category').innerHTML = cats.map((c) => `<option value="${c.slug}">${esc(c.name)}</option>`).join('');
      renderList();
    }

    function renderList(filter = '') {
      const f = filter.toLowerCase();
      const rows = courses.filter((c) => !f || c.name.toLowerCase().includes(f) || c.category.includes(f));
      $('#list').innerHTML = `
        <table>
          <thead><tr><th>Course</th><th>Track</th><th>Tier</th><th>Questions</th><th>Price</th><th></th></tr></thead>
          <tbody>${rows.map((c) => `
            <tr>
              <td><b>${esc(c.name)}</b><div class="muted" style="font-size:12px">/${esc(c.slug)}</div></td>
              <td>${esc(catName(c.category))}</td>
              <td><span class="pill">${esc(c.tier)}</span></td>
              <td>${c.questionCount}</td>
              <td>$${c.priceUsd}</td>
              <td><div class="row-actions">
                <button class="btn btn-ghost btn-sm" onclick="editCourse(${c.id})">Edit</button>
                <button class="btn btn-ghost btn-sm" onclick="manageQuestions(${c.id})">Questions</button>
                <button class="btn btn-ghost btn-sm" style="color:#dc2626" onclick="delCourse(${c.id})">Delete</button>
              </div></td>
            </tr>`).join('')}</tbody>
        </table>
        <p class="muted" style="margin-top:12px">${rows.length} of ${courses.length} courses</p>`;
    }
    const catName = (slug) => (cats.find((c) => c.slug === slug) || {}).name || slug;

    /* ---------- course create/edit ---------- */
    $('#new-course').onclick = () => {
      $('#cm-title').textContent = 'New course';
      $('#course-form').reset(); $('#f-id').value = ''; $('#cm-msg').innerHTML = '';
      openModal('course-modal');
    };
    window.editCourse = (id) => {
      const c = courses.find((x) => x.id === id); if (!c) return;
      $('#cm-title').textContent = 'Edit course'; $('#cm-msg').innerHTML = '';
      $('#f-id').value = c.id; $('#f-name').value = c.name; $('#f-category').value = c.category;
      $('#f-tier').value = c.tier; $('#f-level').value = c.level; $('#f-short').value = c.shortDescription;
      $('#f-long').value = c.longDescription || ''; $('#f-hours').value = c.durationHours;
      $('#f-price').value = c.priceUsd; $('#f-pass').value = (c.exam && c.exam.passPercent) || 70;
      $('#f-modules').value = (c.modules || []).map((m) => m.title).join('\n');
      $('#f-skills').value = (c.skills || []).join('\n');
      openModal('course-modal');
    };
    $('#course-form').onsubmit = async (e) => {
      e.preventDefault();
      const id = $('#f-id').value;
      const body = {
        name: $('#f-name').value, category: $('#f-category').value, tier: $('#f-tier').value, level: $('#f-level').value,
        shortDescription: $('#f-short').value, longDescription: $('#f-long').value,
        durationHours: $('#f-hours').value, priceUsd: $('#f-price').value, passPercent: $('#f-pass').value,
        modules: $('#f-modules').value, skills: $('#f-skills').value,
      };
      try {
        if (id) await api('/admin/courses/' + id, { method: 'PUT', authed: true, body });
        else await api('/admin/courses', { method: 'POST', authed: true, body });
        courses = await api('/admin/courses', { authed: true });
        closeModal('course-modal'); renderList($('#filter').value);
      } catch (err) { $('#cm-msg').innerHTML = `<div class="alert alert-err">${esc(err.message)}</div>`; }
    };
    window.delCourse = async (id) => {
      const c = courses.find((x) => x.id === id);
      if (!confirm(`Delete "${c.name}" and its questions? This cannot be undone.`)) return;
      await api('/admin/courses/' + id, { method: 'DELETE', authed: true });
      courses = await api('/admin/courses', { authed: true });
      renderList($('#filter').value);
    };

    /* ---------- question bank ---------- */
    window.manageQuestions = async (courseId) => {
      activeCourseId = courseId;
      const c = courses.find((x) => x.id === courseId);
      $('#qm-title').textContent = 'Question bank — ' + c.name;
      resetQForm();
      await loadQuestions();
      openModal('q-modal');
    };
    async function loadQuestions() {
      const qs = await api(`/admin/courses/${activeCourseId}/questions`, { authed: true });
      $('#q-list').innerHTML = qs.length ? qs.map((q, i) => `
        <div class="qrow">
          <div style="display:flex;justify-content:space-between;gap:10px">
            <b>${i + 1}. ${esc(q.text)}</b>
            <div class="row-actions">
              <button class="btn btn-ghost btn-sm" onclick='editQ(${q.id})'>Edit</button>
              <button class="btn btn-ghost btn-sm" style="color:#dc2626" onclick='delQ(${q.id})'>Delete</button>
            </div>
          </div>
          ${q.options.map((o, oi) => `<div class="opt-line ${oi === q.correctIndex ? 'correct' : ''}">${oi === q.correctIndex ? '✓' : '○'} ${esc(o)}</div>`).join('')}
        </div>`).join('') : '<p class="muted">No questions yet. Add one below.</p>';
      window._qcache = qs;
      // refresh count in main table
      courses = await api('/admin/courses', { authed: true }); renderList($('#filter').value);
    }
    function renderOptions(values = ['', '', '', ''], correct = 0) {
      optCount = values.length;
      $('#q-options').innerHTML = values.map((v, i) => `
        <div class="field">
          <label style="display:flex;align-items:center;gap:8px">
            <input type="radio" name="correct" value="${i}" ${i === correct ? 'checked' : ''}> Correct
            &nbsp;Option ${i + 1}
          </label>
          <input class="opt-input" data-i="${i}" value="${esc(v)}" required>
        </div>`).join('');
    }
    $('#add-opt').onclick = () => {
      const vals = $$('.opt-input').map((el) => el.value); vals.push('');
      const correct = Number((document.querySelector('input[name=correct]:checked') || {}).value || 0);
      renderOptions(vals, correct);
    };
    window.editQ = (id) => {
      const q = window._qcache.find((x) => x.id === id);
      $('#qf-title').textContent = 'Edit question'; $('#q-id').value = q.id;
      $('#q-text').value = q.text; $('#q-expl').value = q.explanation || '';
      renderOptions(q.options, q.correctIndex);
      $('#q-modal .sheet').scrollTop = $('#q-modal .sheet').scrollHeight;
    };
    window.delQ = async (id) => {
      if (!confirm('Delete this question?')) return;
      await api('/admin/questions/' + id, { method: 'DELETE', authed: true });
      loadQuestions();
    };
    function resetQForm() {
      $('#qf-title').textContent = 'Add a question'; $('#q-id').value = '';
      $('#q-form').reset(); $('#qf-msg').innerHTML = ''; renderOptions();
    }
    $('#q-reset').onclick = resetQForm;
    $('#q-form').onsubmit = async (e) => {
      e.preventDefault();
      const options = $$('.opt-input').map((el) => el.value.trim()).filter(Boolean);
      const correctIndex = Number((document.querySelector('input[name=correct]:checked') || {}).value || 0);
      const body = { text: $('#q-text').value, options, correctIndex, explanation: $('#q-expl').value };
      const id = $('#q-id').value;
      try {
        if (id) await api('/admin/questions/' + id, { method: 'PUT', authed: true, body });
        else await api(`/admin/courses/${activeCourseId}/questions`, { method: 'POST', authed: true, body });
        resetQForm(); loadQuestions();
      } catch (err) { $('#qf-msg').innerHTML = `<div class="alert alert-err">${esc(err.message)}</div>`; }
    };

    /* ---------- modal helpers ---------- */
    window.openModal = (id) => $('#' + id).classList.add('open');
    window.closeModal = (id) => $('#' + id).classList.remove('open');
    $('#filter').oninput = (e) => renderList(e.target.value);

    init();
  </script>
</body>
</html>
