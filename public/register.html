<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create account — ITHR Technologies</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="site-header"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="muted" style="margin-top:-6px">Start learning with ITHR Technologies — it's free to begin.</p>
      <div id="msg"></div>
      <form id="form">
        <div class="field"><label>Full name</label><input type="text" id="name" required autocomplete="name"></div>
        <div class="field"><label>Email</label><input type="email" id="email" required autocomplete="email"></div>
        <div class="field"><label>Password</label><input type="password" id="password" required minlength="6" autocomplete="new-password"><small class="muted">At least 6 characters.</small></div>
        <button class="btn btn-primary btn-block" type="submit">Create account</button>
      </form>
      <p class="muted" style="margin-top:18px;text-align:center;font-size:14px">Already registered? <a href="/login.html">Sign in</a></p>
    </div>
  </div>
  <div id="site-footer"></div>
  <script src="/js/app.js"></script>
  <script>
    if (Auth.isAuthed) location.href = qs('next') || '/dashboard.html';
    $('#form').onsubmit = async (e) => {
      e.preventDefault();
      $('#msg').innerHTML = '';
      try {
        const { token, user } = await api('/auth/register', { method: 'POST', body: {
          name: $('#name').value, email: $('#email').value, password: $('#password').value } });
        Auth.set(token, user);
        location.href = qs('next') || '/dashboard.html';
      } catch (err) {
        $('#msg').innerHTML = `<div class="alert alert-err">${esc(err.message)}</div>`;
      }
    };
  </script>
</body>
</html>
