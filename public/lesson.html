<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lesson — ITHR Technologies</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .lesson-wrap { display:grid; grid-template-columns: 280px 1fr; gap: 28px; max-width: 1120px; margin: 28px auto; padding: 0 20px; align-items:start; }
    .syllabus { position: sticky; top: 90px; background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding: 16px; }
    .syllabus h4 { font-size:13px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 12px; }
    .syllabus a { display:flex; gap:10px; align-items:flex-start; padding:9px 10px; border-radius:9px; font-size:14px; color:var(--ink); }
    .syllabus a:hover { background:var(--bg-soft); }
    .syllabus a.active { background:rgba(46,127,193,.10); color:var(--brand-600); font-weight:700; }
    .syllabus .dot { width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);flex:none;display:grid;place-items:center;font-size:11px;color:var(--muted); }
    .syllabus a.done .dot { background:var(--ok); border-color:var(--ok); color:#fff; }
    .lesson { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding: 34px; }
    .lesson .crumbs { font-size:13px; color:var(--muted); margin-bottom:10px; }
    .lesson h1 { font-size: clamp(24px,3vw,32px); }
    .lesson h3 { font-size:16px; text-transform:uppercase; letter-spacing:.04em; color:var(--brand-700); margin-top:26px; }
    .lesson ul { padding-left:20px; } .lesson li { margin:7px 0; }
    .callout { background:var(--bg-soft); border:1px solid var(--line); border-left:3px solid var(--accent-500); border-radius:10px; padding:14px 16px; margin-top:10px; }
    .lesson-nav { display:flex; justify-content:space-between; gap:12px; margin-top:30px; padding-top:20px; border-top:1px solid var(--line); flex-wrap:wrap; }
    @media(max-width:820px){ .lesson-wrap{grid-template-columns:1fr;} .syllabus{position:static;} }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <div class="lesson-wrap">
    <aside class="syllabus" id="syllabus"></aside>
    <main class="lesson" id="lesson"><div class="loading">Loading lesson…</div></main>
  </div>
  <div id="site-footer"></div>
  <script src="/js/app.js"></script>
  <script>
    if (!Auth.isAuthed) location.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.search);
    const slug = qs('slug');
    let course, enrollment, current = Number(qs('m')) || 1;

    async function init() {
      try { course = await api('/courses/' + encodeURIComponent(slug)); }
      catch { $('#lesson').innerHTML = '<p class="muted">Course not found.</p>'; return; }
      document.title = course.name + ' — Lessons';
      try { enrollment = (await api('/enrollments', { authed: true })).find((e) => e.courseId === course.id); } catch {}
      render();
    }

    function done(order) { return enrollment && enrollment.completedModules.includes(order); }

    function render() {
      const mods = course.modules || [];
      $('#syllabus').innerHTML = `<h4>${esc(course.name)}</h4>` + mods.map((m) => `
        <a href="?slug=${encodeURIComponent(slug)}&m=${m.order}" class="${m.order === current ? 'active' : ''} ${done(m.order) ? 'done' : ''}">
          <span class="dot">${done(m.order) ? '✓' : m.order}</span>
          <span>${esc(m.title)}</span>
        </a>`).join('') +
        `<a href="/exam.html?slug=${encodeURIComponent(slug)}" style="margin-top:8px;font-weight:700;color:var(--brand-600)"><span class="dot">★</span><span>Take the exam</span></a>`;

      const m = mods.find((x) => x.order === current) || mods[0];
      if (!m) { $('#lesson').innerHTML = '<p class="muted">No modules yet.</p>'; return; }

      const hasBody = m.objectives || m.keyPoints || m.summary;
      let html = `<div class="crumbs"><a href="/course.html?slug=${encodeURIComponent(slug)}">${esc(course.name)}</a> / Module ${m.order}</div>
        <h1>${esc(m.title)}</h1>`;
      if (hasBody) {
        if (m.objectives) html += `<h3>Learning objectives</h3><ul>${m.objectives.map((o)=>`<li>${esc(o)}</li>`).join('')}</ul>`;
        if (m.keyPoints) html += `<h3>Key points</h3><ul>${m.keyPoints.map((o)=>`<li>${esc(o)}</li>`).join('')}</ul>`;
        if (m.example) html += `<h3>Example</h3><div class="callout">${esc(m.example)}</div>`;
        if (m.summary) html += `<h3>Summary</h3><p>${esc(m.summary)}</p>`;
      } else {
        html += `<div class="callout">Full lesson content for this module is coming soon. You can still track your progress and take the exam.</div>`;
      }

      html += `<div class="lesson-nav">
        <div>${m.order > 1 ? `<a class="btn btn-ghost" href="?slug=${encodeURIComponent(slug)}&m=${m.order-1}">← Previous</a>` : ''}</div>
        <div style="display:flex;gap:10px">
          ${enrollment ? `<button class="btn btn-accent" id="mark">${done(m.order) ? '✓ Completed' : 'Mark complete'}</button>` : `<a class="btn btn-ghost" href="/course.html?slug=${encodeURIComponent(slug)}">Enroll to track progress</a>`}
          ${m.order < mods.length ? `<a class="btn btn-primary" href="?slug=${encodeURIComponent(slug)}&m=${m.order+1}">Next →</a>` : `<a class="btn btn-primary" href="/exam.html?slug=${encodeURIComponent(slug)}">Go to exam →</a>`}
        </div>
      </div>`;
      $('#lesson').innerHTML = html;

      const mark = $('#mark');
      if (mark) mark.onclick = async () => {
        const res = await api(`/enrollments/${course.id}/progress`, { method:'POST', authed:true, body:{ moduleOrder: m.order } });
        enrollment.completedModules = res.completedModules;
        render();
      };
    }
    init();
  </script>
</body>
</html>
